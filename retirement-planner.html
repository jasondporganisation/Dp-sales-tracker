<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Retirement Planner — Dream Planners</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body style="margin:0;padding:0">
  <div id="root"></div>
  <script type="text/babel" data-presets="react">
    const { useState, useMemo, useEffect } = React;

function CPFRetirementPlanner() {
  // ---------- CLIENT PROFILE ----------
  const [clientName, setClientName] = useState("");
  const [clientDOB, setClientDOB] = useState("");
  const [currentAge, setCurrentAge] = useState(40);
  const [retirementAge, setRetirementAge] = useState(65);
  const [lifeExpectancy, setLifeExpectancy] = useState(85);
  const [monthlyExpense, setMonthlyExpense] = useState(3500);
  const [inflationRate, setInflationRate] = useState(2.5);

  // ---------- CPF ----------
  const [tier, setTier] = useState("FRS");
  const [cpfPlan, setCpfPlan] = useState("standard");
  const CPF_TIERS = {
    BRS: { sum: 110200, payout: 950, label: "Basic Retirement Sum" },
    FRS: { sum: 220400, payout: 1780, label: "Full Retirement Sum" },
    ERS: { sum: 440800, payout: 3295, label: "Enhanced Retirement Sum" },
  };
  const ESCALATING_START_RATIO = 0.8;
  const ESCALATING_GROWTH = 0.02;

  // ---------- INSURANCE ----------
  const [policies, setPolicies] = useState([
    { id: 1, name: "", type: "Endowment", annualPremium: 0, cashValue: 0,
      maturityAge: 65, projectedPayout: 0, payoutType: "lump",
      monthlyPayout: 0, payoutYears: 20 },
  ]);
  const addPolicy = () => setPolicies([...policies, {
    id: Date.now(), name: "", type: "Endowment", annualPremium: 0, cashValue: 0,
    maturityAge: 65, projectedPayout: 0, payoutType: "lump",
    monthlyPayout: 0, payoutYears: 20,
  }]);
  const removePolicy = (id) => setPolicies(policies.filter((p) => p.id !== id));
  const updatePolicy = (id, field, value) =>
    setPolicies(policies.map((p) => (p.id === id ? { ...p, [field]: value } : p)));

  // ---------- BUCKETS ----------
  const [buckets, setBuckets] = useState([
    { id: 1, name: "Cash / Fixed Deposit", amount: 0, returnRate: 3.0 },
    { id: 2, name: "SRS", amount: 0, returnRate: 5.0 },
    { id: 3, name: "Stocks / ETFs", amount: 0, returnRate: 7.0 },
    { id: 4, name: "Unit Trusts", amount: 0, returnRate: 5.5 },
  ]);
  const addBucket = () => setBuckets([...buckets, {
    id: Date.now(), name: "New bucket", amount: 0, returnRate: 5.0,
  }]);
  const removeBucket = (id) => setBuckets(buckets.filter((b) => b.id !== id));
  const updateBucket = (id, field, value) =>
    setBuckets(buckets.map((b) => (b.id === id ? { ...b, [field]: value } : b)));

  // ---------- INVESTMENT SIMULATOR ----------
  const [simContribution, setSimContribution] = useState(10000);
  const [simMode, setSimMode] = useState("yearly");
  const [simTerm, setSimTerm] = useState(10);
  const [simDividendRate, setSimDividendRate] = useState(6);
  const [simDividendAction, setSimDividendAction] = useState("reinvest");

  // ---------- UI STATE ----------
  const [chartHover, setChartHover] = useState(null);
  const [stickyVisible, setStickyVisible] = useState(false);

  // ---------- SAVE / LOAD ----------
  const [savedClients, setSavedClients] = useState({});
  const [selectedClient, setSelectedClient] = useState("");
  const [showSaveModal, setShowSaveModal] = useState(false);
  const [saveName, setSaveName] = useState("");

  useEffect(() => {
    if (window.__dpClientCache) setSavedClients(window.__dpClientCache);
  }, []);

  useEffect(() => {
    const handle = () => setStickyVisible(window.scrollY > 500);
    window.addEventListener("scroll", handle, { passive: true });
    return () => window.removeEventListener("scroll", handle);
  }, []);

  const saveClient = () => {
    const name = saveName.trim() || clientName.trim() || `Client ${Object.keys(savedClients).length + 1}`;
    const snapshot = {
      clientName, clientDOB, currentAge, retirementAge, lifeExpectancy,
      monthlyExpense, inflationRate, tier, cpfPlan, policies, buckets,
      savedAt: new Date().toISOString(),
    };
    const updated = { ...savedClients, [name]: snapshot };
    setSavedClients(updated);
    window.__dpClientCache = updated;
    setShowSaveModal(false);
    setSaveName("");
    setSelectedClient(name);
  };

  const loadClient = (name) => {
    const data = savedClients[name];
    if (!data) return;
    setClientName(data.clientName || "");
    setClientDOB(data.clientDOB || "");
    setCurrentAge(data.currentAge);
    setRetirementAge(data.retirementAge);
    setLifeExpectancy(data.lifeExpectancy);
    setMonthlyExpense(data.monthlyExpense);
    setInflationRate(data.inflationRate);
    setTier(data.tier);
    setCpfPlan(data.cpfPlan || "standard");
    setPolicies(data.policies || []);
    setBuckets(data.buckets || []);
    setSelectedClient(name);
  };

  const deleteClient = (name) => {
    const updated = { ...savedClients };
    delete updated[name];
    setSavedClients(updated);
    window.__dpClientCache = updated;
    if (selectedClient === name) setSelectedClient("");
  };

  const newClient = () => {
    setClientName(""); setClientDOB("");
    setCurrentAge(40); setRetirementAge(65); setLifeExpectancy(85);
    setMonthlyExpense(3500); setInflationRate(2.5);
    setTier("FRS"); setCpfPlan("standard");
    setPolicies([{ id: 1, name: "", type: "Endowment", annualPremium: 0, cashValue: 0, maturityAge: 65, projectedPayout: 0, payoutType: "lump", monthlyPayout: 0, payoutYears: 20 }]);
    setBuckets([
      { id: 1, name: "Cash / Fixed Deposit", amount: 0, returnRate: 3.0 },
      { id: 2, name: "SRS", amount: 0, returnRate: 5.0 },
      { id: 3, name: "Stocks / ETFs", amount: 0, returnRate: 7.0 },
      { id: 4, name: "Unit Trusts", amount: 0, returnRate: 5.5 },
    ]);
    setSelectedClient("");
  };

  // ---------- CALCULATIONS ----------
  const results = useMemo(() => {
    const yearsToRetirement = Math.max(0, retirementAge - currentAge);
    const yearsInRetirement = Math.max(1, lifeExpectancy - retirementAge);
    const inflation = inflationRate / 100;

    const firstYearMonthlyExpense =
      monthlyExpense * Math.pow(1 + inflation, yearsToRetirement);

    const baseCpf = CPF_TIERS[tier].payout;
    const cpfStartPayout =
      cpfPlan === "escalating" ? baseCpf * ESCALATING_START_RATIO : baseCpf;

    const totalAnnualPremium = policies.reduce((s, p) => s + (parseFloat(p.annualPremium) || 0), 0);
    const totalCashValue = policies.reduce((s, p) => s + (parseFloat(p.cashValue) || 0), 0);
    const totalLumpPayouts = policies
      .filter((p) => p.payoutType === "lump")
      .reduce((s, p) => s + (parseFloat(p.projectedPayout) || 0), 0);

    const bucketsAtRetirement = buckets.map((b) => ({
      ...b,
      futureValue:
        (parseFloat(b.amount) || 0) *
        Math.pow(1 + (parseFloat(b.returnRate) || 0) / 100, yearsToRetirement),
    }));
    const totalBucketsFV = bucketsAtRetirement.reduce((s, b) => s + b.futureValue, 0);

    const totalBucketAmount = buckets.reduce((s, b) => s + (parseFloat(b.amount) || 0), 0);
    const blendedReturn = totalBucketAmount > 0
      ? buckets.reduce((s, b) => s + ((parseFloat(b.amount) || 0) / totalBucketAmount) * (parseFloat(b.returnRate) || 0), 0)
      : 4;

    const chartData = [];
    let savingsPool = totalBucketsFV + totalLumpPayouts;
    let cumulativeShortfall = 0;

    for (let yr = 0; yr < yearsInRetirement; yr++) {
      const ageAtYear = retirementAge + yr;
      const monthlyNeed = firstYearMonthlyExpense * Math.pow(1 + inflation, yr);
      const annualNeed = monthlyNeed * 12;

      const cpfMonthly = cpfStartPayout * Math.pow(1 + (cpfPlan === "escalating" ? ESCALATING_GROWTH : 0), yr);
      const annualCpf = cpfMonthly * 12;

      let annualInsMonthly = 0;
      policies.forEach((p) => {
        if (p.payoutType === "monthly") {
          const startAge = parseFloat(p.maturityAge) || retirementAge;
          const years = parseFloat(p.payoutYears) || 0;
          if (ageAtYear >= startAge && ageAtYear < startAge + years) {
            annualInsMonthly += (parseFloat(p.monthlyPayout) || 0) * 12;
          }
        }
      });

      const guaranteedIncome = annualCpf + annualInsMonthly;
      const gap = Math.max(0, annualNeed - guaranteedIncome);

      const drawn = Math.min(savingsPool, gap);
      savingsPool = Math.max(0, savingsPool - drawn);
      savingsPool *= 1 + blendedReturn / 100;

      const uncovered = gap - drawn;
      cumulativeShortfall += uncovered;

      chartData.push({
        age: ageAtYear,
        need: Math.round(monthlyNeed),
        cpf: Math.round(cpfMonthly),
        insurance: Math.round(annualInsMonthly / 12),
        savingsRemaining: Math.round(savingsPool),
        uncovered: Math.round(uncovered / 12),
      });
    }

    const solverReturn = 0.06;
    const lumpSumToday = cumulativeShortfall > 0
      ? cumulativeShortfall / Math.pow(1 + solverReturn, yearsToRetirement) : 0;
    const monthlyRate = solverReturn / 12;
    const months = yearsToRetirement * 12;
    const monthlyTopUp = cumulativeShortfall > 0 && months > 0
      ? cumulativeShortfall / ((Math.pow(1 + monthlyRate, months) - 1) / monthlyRate) : 0;

    const solveScenario = (rate) => {
      if (cumulativeShortfall <= 0) return { lump: 0, monthly: 0 };
      const lump = cumulativeShortfall / Math.pow(1 + rate, yearsToRetirement);
      const mr = rate / 12;
      const monthly = months > 0 ? cumulativeShortfall / ((Math.pow(1 + mr, months) - 1) / mr) : 0;
      return { lump, monthly };
    };

    return {
      yearsToRetirement, yearsInRetirement, firstYearMonthlyExpense,
      cpfStartPayout, cpfPlan,
      coveragePct: Math.min(100, (cpfStartPayout / firstYearMonthlyExpense) * 100),
      totalAnnualPremium, totalCashValue, totalLumpPayouts,
      totalBucketsFV, blendedReturn, cumulativeShortfall, chartData,
      lumpSumToday, monthlyTopUp,
      scenarios: {
        four: solveScenario(0.04),
        six: solveScenario(0.06),
        eight: solveScenario(0.08),
      },
    };
  }, [currentAge, retirementAge, lifeExpectancy, monthlyExpense, inflationRate, tier, cpfPlan, policies, buckets]);

  const fmt = (n) => "S$" + Math.round(n || 0).toLocaleString("en-SG");
  const maxChartValue = Math.max(...results.chartData.map((d) => d.need), 1);

  // ---------- INVESTMENT SIMULATOR CALCULATION ----------
  const simulation = useMemo(() => {
    const contribution = parseFloat(simContribution) || 0;
    const term = parseInt(simTerm) || 10;
    const rate = (parseFloat(simDividendRate) || 0) / 100;
    const isMonthly = simMode === "monthly";

    const periodContribution = isMonthly ? contribution : contribution;
    const periodsPerYear = isMonthly ? 12 : 1;
    const periodRate = rate / periodsPerYear;
    const totalPeriods = term * periodsPerYear;
    const totalContributed = periodContribution * totalPeriods;

    let policyValue = 0;
    let cumulativeCashDividends = 0;
    const yearlySnapshots = [];
    let yearAccContrib = 0;
    let yearAccDividends = 0;

    for (let p = 0; p < totalPeriods; p++) {
      policyValue += periodContribution;
      yearAccContrib += periodContribution;
      const dividend = policyValue * periodRate;
      yearAccDividends += dividend;

      if (simDividendAction === "reinvest") {
        policyValue += dividend;
      } else {
        cumulativeCashDividends += dividend;
      }

      if ((p + 1) % periodsPerYear === 0) {
        const year = Math.floor(p / periodsPerYear) + 1;
        yearlySnapshots.push({
          year,
          contributed: yearAccContrib,
          totalContributedToDate: periodContribution * (p + 1),
          policyValue: policyValue,
          annualDividend: yearAccDividends,
          cumulativeCashDividends: cumulativeCashDividends,
        });
        yearAccContrib = 0;
        yearAccDividends = 0;
      }
    }

    const finalPolicyValue = policyValue;
    const postTermMonthlyDividend = (finalPolicyValue * rate) / 12;
    const postTermAnnualDividend = finalPolicyValue * rate;

    const firstYearMonthlyGap = Math.max(0, results.firstYearMonthlyExpense - results.cpfStartPayout);
    const gapClosurePct = firstYearMonthlyGap > 0
      ? Math.min(100, (postTermMonthlyDividend / firstYearMonthlyGap) * 100)
      : 100;

    const yearsOfPayout = Math.max(0, lifeExpectancy - retirementAge);
    const lifetimeDividends = postTermAnnualDividend * yearsOfPayout;
    const adjustedShortfall = Math.max(0, results.cumulativeShortfall - lifetimeDividends);

    return {
      totalContributed, finalPolicyValue, postTermMonthlyDividend,
      postTermAnnualDividend, cumulativeCashDividends, yearlySnapshots,
      firstYearMonthlyGap, gapClosurePct, lifetimeDividends,
      adjustedShortfall, periodContribution, isMonthly, term,
    };
  }, [simContribution, simMode, simTerm, simDividendRate, simDividendAction, results, lifeExpectancy, retirementAge]);

  // ---------- BRANDED PDF EXPORT ----------
  const exportPDF = async () => {
    const loadScript = (src) => new Promise((resolve, reject) => {
      const s = document.createElement("script");
      s.src = src; s.onload = resolve; s.onerror = reject;
      document.head.appendChild(s);
    });
    if (!window.jspdf) {
      await loadScript("https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js");
    }
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ unit: "pt", format: "a4" });
    const pageW = doc.internal.pageSize.getWidth();
    const pageH = doc.internal.pageSize.getHeight();
    const margin = 40;
    let y = margin;

    const teal = [13, 79, 74];
    const cream = [245, 242, 234];
    const ink = [26, 26, 26];
    const muted = [107, 107, 107];
    const accent = [244, 162, 97];

    const drawFooter = () => {
      doc.setDrawColor(...muted); doc.setLineWidth(0.3);
      doc.line(margin, pageH - 40, pageW - margin, pageH - 40);
      doc.setFontSize(7); doc.setTextColor(...muted); doc.setFont(undefined, "normal");
      doc.text("Jason Ng · IAC 1220629 · DP Organisation · Great Eastern Financial Advisers", margin, pageH - 26);
      doc.text(`Page ${doc.internal.getNumberOfPages()}`, pageW - margin, pageH - 26, { align: "right" });
      doc.text("Illustration only — not financial advice. Actual returns and CPF payouts may vary.", margin, pageH - 14);
    };

    doc.setFillColor(...teal); doc.rect(0, 0, pageW, 90, "F");
    doc.setFontSize(9); doc.setTextColor(...cream); doc.setFont(undefined, "normal");
    doc.text("DP ORGANISATION · GREAT EASTERN FINANCIAL ADVISERS", margin, 32);
    doc.setFontSize(22); doc.setFont(undefined, "bold");
    doc.text("Retirement Shortfall Analysis", margin, 60);
    doc.setFontSize(10); doc.setFont(undefined, "normal");
    doc.text(`Prepared ${new Date().toLocaleDateString("en-SG", { day: "numeric", month: "long", year: "numeric" })}`, margin, 78);
    y = 120;

    doc.setTextColor(...ink); doc.setFontSize(9); doc.setFont(undefined, "bold");
    doc.text("CLIENT", margin, y);
    doc.setFont(undefined, "normal"); doc.setFontSize(16);
    doc.text(clientName || "—", margin, y + 20);
    doc.setFontSize(9); doc.setTextColor(...muted);
    if (clientDOB) doc.text(`DOB: ${clientDOB}`, margin, y + 36);
    doc.text(`Current age: ${currentAge}   ·   Retirement: ${retirementAge}   ·   Horizon: ${lifeExpectancy}`, margin, y + (clientDOB ? 50 : 36));
    y += clientDOB ? 72 : 58;

    const sectionHeader = (num, title) => {
      doc.setDrawColor(...ink); doc.setLineWidth(0.5);
      doc.line(margin, y, pageW - margin, y);
      y += 14;
      doc.setTextColor(...muted); doc.setFontSize(8); doc.setFont(undefined, "bold");
      doc.text(`${num}  ·  ${title.toUpperCase()}`, margin, y);
      y += 20;
    };

    sectionHeader("01", "Planning Inputs");
    doc.setTextColor(...ink); doc.setFontSize(10); doc.setFont(undefined, "normal");
    const inputRows = [
      ["Monthly expenses (today)", fmt(monthlyExpense)],
      ["Inflation rate", `${inflationRate}% p.a.`],
      ["CPF tier", `${tier} — ${fmt(CPF_TIERS[tier].sum)}`],
      ["CPF LIFE plan", cpfPlan === "escalating" ? "Escalating (+2% p.a.)" : "Standard (level)"],
      ["Years to retirement", `${results.yearsToRetirement}`],
      ["Years in retirement", `${results.yearsInRetirement}`],
    ];
    inputRows.forEach(([k, v]) => {
      doc.setTextColor(...muted); doc.text(k, margin, y);
      doc.setTextColor(...ink); doc.text(v, pageW - margin, y, { align: "right" });
      y += 16;
    });
    y += 8;

    sectionHeader("02", "Insurance Portfolio");
    doc.setFontSize(8); doc.setTextColor(...muted); doc.setFont(undefined, "bold");
    doc.text("POLICY", margin, y); doc.text("TYPE", margin + 180, y);
    doc.text("PREMIUM/YR", margin + 260, y); doc.text("CASH VALUE", margin + 340, y);
    doc.text("PAYOUT", margin + 420, y);
    y += 4; doc.setDrawColor(...ink); doc.line(margin, y, pageW - margin, y); y += 12;
    doc.setFont(undefined, "normal"); doc.setFontSize(9); doc.setTextColor(...ink);

    if (policies.length === 0 || policies.every((p) => !p.name && !p.annualPremium)) {
      doc.setTextColor(...muted); doc.setFont(undefined, "italic");
      doc.text("No policies captured.", margin, y); y += 16;
      doc.setFont(undefined, "normal");
    } else {
      policies.forEach((p) => {
        if (!p.name && !p.annualPremium) return;
        const payoutDesc = p.payoutType === "lump" ? fmt(p.projectedPayout) : `${fmt(p.monthlyPayout)}/mo × ${p.payoutYears}y`;
        doc.setTextColor(...ink);
        doc.text((p.name || "Unnamed").substring(0, 26), margin, y);
        doc.text(p.type, margin + 180, y);
        doc.text(fmt(p.annualPremium), margin + 260, y);
        doc.text(fmt(p.cashValue), margin + 340, y);
        doc.text(payoutDesc, margin + 420, y);
        y += 14;
        if (y > pageH - 80) { drawFooter(); doc.addPage(); y = margin; }
      });
    }
    y += 4; doc.setDrawColor(...ink); doc.line(margin, y, pageW - margin, y); y += 14;
    doc.setFont(undefined, "bold"); doc.setTextColor(...teal);
    doc.text("TOTAL", margin, y);
    doc.text(fmt(results.totalAnnualPremium), margin + 260, y);
    doc.text(fmt(results.totalCashValue), margin + 340, y);
    doc.text(fmt(results.totalLumpPayouts) + " (lump)", margin + 420, y);
    y += 24;

    if (y > pageH - 180) { drawFooter(); doc.addPage(); y = margin; }
    sectionHeader("03", "Savings & Investments");
    doc.setFontSize(8); doc.setTextColor(...muted); doc.setFont(undefined, "bold");
    doc.text("BUCKET", margin, y); doc.text("AMOUNT TODAY", margin + 220, y);
    doc.text("RETURN P.A.", margin + 340, y); doc.text(`VALUE AT ${retirementAge}`, margin + 430, y);
    y += 4; doc.setDrawColor(...ink); doc.line(margin, y, pageW - margin, y); y += 12;
    doc.setFont(undefined, "normal"); doc.setFontSize(9); doc.setTextColor(...ink);
    buckets.forEach((b) => {
      const yrs = Math.max(0, retirementAge - currentAge);
      const fv = (parseFloat(b.amount) || 0) * Math.pow(1 + (parseFloat(b.returnRate) || 0) / 100, yrs);
      doc.setTextColor(...ink);
      doc.text(b.name, margin, y); doc.text(fmt(b.amount), margin + 220, y);
      doc.text(`${b.returnRate}%`, margin + 340, y);
      doc.setTextColor(...teal); doc.text(fmt(fv), margin + 430, y);
      y += 14;
      if (y > pageH - 80) { drawFooter(); doc.addPage(); y = margin; }
    });
    y += 4; doc.setDrawColor(...ink); doc.line(margin, y, pageW - margin, y); y += 14;
    doc.setFont(undefined, "bold"); doc.setTextColor(...teal);
    doc.text("TOTAL", margin, y);
    doc.text(fmt(buckets.reduce((s, b) => s + (parseFloat(b.amount) || 0), 0)), margin + 220, y);
    doc.text(`${results.blendedReturn.toFixed(1)}% blended`, margin + 340, y);
    doc.text(fmt(results.totalBucketsFV), margin + 430, y);
    y += 30;

    if (y > pageH - 200) { drawFooter(); doc.addPage(); y = margin; }
    sectionHeader("04", "Retirement Projection");
    const metrics = [
      { l: "EXPENSES AT 65", v: fmt(results.firstYearMonthlyExpense), sub: "/ month" },
      { l: "CPF LIFE PAYOUT", v: fmt(results.cpfStartPayout), sub: "/ month (yr 1)" },
      { l: "COVERAGE", v: `${Math.round(results.coveragePct)}%`, sub: "of first-year need" },
      { l: "SAVINGS AT 65", v: fmt(results.totalBucketsFV + results.totalLumpPayouts), sub: "incl. insurance" },
    ];
    const mW = (pageW - margin * 2 - 12) / 4;
    metrics.forEach((m, i) => {
      const x = margin + i * (mW + 4);
      doc.setFillColor(...cream); doc.rect(x, y, mW, 70, "F");
      doc.setFontSize(7); doc.setTextColor(...muted); doc.setFont(undefined, "bold");
      doc.text(m.l, x + 10, y + 16);
      doc.setFontSize(14); doc.setTextColor(...ink); doc.setFont(undefined, "bold");
      doc.text(m.v, x + 10, y + 40);
      doc.setFontSize(8); doc.setTextColor(...muted); doc.setFont(undefined, "italic");
      doc.text(m.sub, x + 10, y + 58);
    });
    y += 88;

    if (y > pageH - 240) { drawFooter(); doc.addPage(); y = margin; }
    doc.setFillColor(...ink); doc.rect(margin, y, pageW - margin * 2, 180, "F");
    doc.setFontSize(8); doc.setTextColor(...cream); doc.setFont(undefined, "bold");
    doc.text("05 · ANALYSIS", margin + 20, y + 22);

    if (results.cumulativeShortfall > 0) {
      doc.setFontSize(12); doc.setFont(undefined, "normal");
      doc.text("Total projected shortfall across retirement:", margin + 20, y + 46);
      doc.setFontSize(24); doc.setFont(undefined, "bold"); doc.setTextColor(...accent);
      doc.text(fmt(results.cumulativeShortfall), margin + 20, y + 76);
      doc.setFontSize(7); doc.setTextColor(...accent); doc.setFont(undefined, "bold");
      doc.text("LUMP SUM TODAY @ 6% P.A.", margin + 20, y + 104);
      doc.setFontSize(16); doc.setTextColor(...cream);
      doc.text(fmt(results.lumpSumToday), margin + 20, y + 126);
      doc.setFontSize(8); doc.setTextColor(...cream); doc.setFont(undefined, "italic");
      doc.text(`Single contribution, grows to close gap by ${retirementAge}`, margin + 20, y + 144);
      const midX = margin + (pageW - margin * 2) / 2 + 10;
      doc.setFontSize(7); doc.setTextColor(...accent); doc.setFont(undefined, "bold");
      doc.text(`MONTHLY TOP-UP @ 6% P.A. × ${results.yearsToRetirement}Y`, midX, y + 104);
      doc.setFontSize(16); doc.setTextColor(...cream); doc.setFont(undefined, "bold");
      doc.text(fmt(results.monthlyTopUp), midX, y + 126);
      doc.setFontSize(8); doc.setTextColor(...cream); doc.setFont(undefined, "italic");
      doc.text("Regular contribution until retirement", midX, y + 144);
    } else {
      doc.setFontSize(14); doc.setFont(undefined, "bold"); doc.setTextColor(...cream);
      doc.text("On track.", margin + 20, y + 60);
      doc.setFontSize(10); doc.setFont(undefined, "normal");

    const getYIncome = (d) => H - ((d.cpf + d.insurance) / maxChartValue) * H * 0.9;

        <div className="mg" style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(220px, 1fr))", gap: 14, marginBottom: 16 }}>
          {[

            <div key={m.label} className="metric-card" style={{ background: m.bg }}>

                <linearGradient id="gNeed" x1="0" y1="0" x2="0" y2="1">

              {chartPaths.needLine && <polyline points={chartPaths.needLine} fill="none" stroke={rose} strokeWidth="2.5" strokeLinejoin="round" />}
              {chartPaths.incomeLine && <polyline points={chartPaths.incomeLine} fill="none" stroke={green} strokeWidth="2" strokeLinejoin="round" />}

              {results.chartData.map((d, i) => {
                const n = results.chartData.length;

                <line x1={chartPaths.pts[chartHover].x} y1={0} x2={chartPaths.pts[chartHover].x} y2={270} stroke={gold} strokeWidth="1.5" strokeDasharray="3,4" opacity="0.7" />

            <div style={{ fontSize: 14, color: "rgba(255,255,255,0.55)", marginBottom: 6, fontStyle: "italic" }}>Total projected shortfall across retirement</div>
            <div style={{ fontFamily: "'Playfair Display', serif", fontSize: "clamp(42px, 7vw, 72px)", fontWeight: 800, color: gold, letterSpacing: "-0.03em", lineHeight: 1, marginBottom: 16 }}>

            <div className="sig" style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(260px, 1fr))", gap: 14, marginBottom: 28 }}>
              {[

                <div key={sc.title} style={{ background: "rgba(255,255,255,0.07)", border: `1px solid rgba(255,255,255,0.12)`, padding: "24px 26px", borderRadius: 16, backdropFilter: "blur(4px)" }}>
                  <div style={{ fontFamily: "'DM Mono', monospace", fontSize: 10, letterSpacing: "0.12em", textTransform: "uppercase", color: goldLight, marginBottom: 4, opacity: 0.8 }}>{sc.title}</div>
                  <div style={{ fontSize: 12, color: "rgba(255,255,255,0.4)", marginBottom: 14 }}>{sc.sub}</div>
                  <div style={{ fontFamily: "'Playfair Display', serif", fontSize: "clamp(28px, 4vw, 42px)", fontWeight: 700, letterSpacing: "-0.025em", lineHeight: 1, marginBottom: 10 }}>{sc.val}</div>
                  <div style={{ fontSize: 12, color: "rgba(255,255,255,0.45)", fontStyle: "italic" }}>{sc.note}</div>

            </p>

        </div>

            {/* Term */}
            <div>
              <div style={{ fontFamily: "'DM Mono', monospace", fontSize: 10, letterSpacing: "0.12em", textTransform: "uppercase", color: muted, marginBottom: 10 }}>Contribution Term</div>
              <div className="toggle-pill">
                {[[5,"5 Years"],[10,"10 Years"]].map(([v,l]) => (
                  <button key={v} aria-pressed={simTerm === v} onClick={() => setSimTerm(v)}>{l}</button>
                ))}
              </div>
            </div>
            {/* Rate */}
            <div>
              <div style={{ fontFamily: "'DM Mono', monospace", fontSize: 10, letterSpacing: "0.12em", textTransform: "uppercase", color: muted, marginBottom: 10 }}>Dividend Rate p.a.</div>
              <div style={{ display: "flex", alignItems: "center", background: bg, border: `1.5px solid ${border}`, borderRadius: 12, padding: "12px 16px" }}>
                <input type="number" step="0.1" value={simDividendRate} onChange={(e) => setSimDividendRate(e.target.value)}
                  style={{ background: "transparent", border: "none", outline: "none", color: navy, fontSize: 24, fontFamily: "'Playfair Display', serif", fontWeight: 700, width: "100%" }} />
                <span style={{ fontFamily: "'DM Mono', monospace", fontSize: 13, color: muted, marginLeft: 6 }}>%</span>
              </div>
            </div>
          </div>

          {/* Dividend treatment */}
          <div style={{ marginBottom: 32 }}>
            <div style={{ fontFamily: "'DM Mono', monospace", fontSize: 10, letterSpacing: "0.12em", textTransform: "uppercase", color: muted, marginBottom: 10 }}>Dividend Treatment</div>
            <div className="toggle-pill">
              {[["reinvest","Reinvest · Compound"],["cashout","Cash Out · Income"]].map(([v,l]) => (
                <button key={v} aria-pressed={simDividendAction === v} onClick={() => setSimDividendAction(v)}>{l}</button>
              ))}
            </div>
          </div>

          {/* Metrics grid */}
          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(180px, 1fr))", gap: 12, marginBottom: 28 }}>
            {[
              { label: "Total Contributed", value: fmt(simulation.totalContributed), sub: `Over ${simulation.term} yrs`, hi: false },
              { label: `Policy Value · Yr ${simulation.term}`, value: fmt(simulation.finalPolicyValue), sub: simDividendAction === "reinvest" ? "Compounded" : "Base only", hi: true },
              { label: "Monthly Dividend", value: fmt(simulation.postTermMonthlyDividend), sub: `${simDividendRate}% of policy value`, hi: true },
              ...(simDividendAction === "cashout"
                ? [{ label: "Cash Dividends", value: fmt(simulation.cumulativeCashDividends), sub: `During ${simulation.term}-yr term`, hi: false }]
                : [{ label: "Annual Dividend", value: fmt(simulation.postTermAnnualDividend), sub: "Post-term, per year", hi: false }]),
            ].map((m) => (
              <div key={m.label} style={{
                background: m.hi ? `linear-gradient(135deg, ${goldPale}, #faf3df)` : bg,
                padding: "18px 20px", borderRadius: 14,
                border: `1.5px solid ${m.hi ? gold : border}`,
              }}>
                <div style={{ fontFamily: "'DM Mono', monospace", fontSize: 9.5, letterSpacing: "0.12em", textTransform: "uppercase", color: m.hi ? gold : muted, marginBottom: 8, fontWeight: 500 }}>{m.label}</div>
                <div style={{ fontFamily: "'Playfair Display', serif", fontSize: 22, fontWeight: 700, color: m.hi ? navy : text, letterSpacing: "-0.02em" }}>{m.value}</div>
                <div style={{ fontSize: 11, color: muted, marginTop: 5, fontStyle: "italic" }}>{m.sub}</div>
              </div>
            ))}
          </div>

          {/* Year-by-year table */}
          <div style={{ background: bg, border: `1.5px solid ${border}`, borderRadius: 16, padding: "20px 22px", marginBottom: 28 }}>
            <div style={{ fontFamily: "'DM Mono', monospace", fontSize: 10, letterSpacing: "0.15em", textTransform: "uppercase", color: muted, marginBottom: 16 }}>Year-by-year breakdown</div>
            <div style={{ overflowX: "auto" }}>
              <table style={{ width: "100%", fontSize: 12.5, borderCollapse: "separate", borderSpacing: 0, minWidth: 480 }}>
                <thead>
                  <tr>
                    {["Year","Contributed","Dividend","Policy Value"].map((h,j) => (
                      <th key={h} style={{ textAlign: j===0?"left":"right", padding: "10px 12px 12px", fontFamily: "'DM Mono', monospace", fontSize: 10, letterSpacing: "0.1em", textTransform: "uppercase", color: "rgba(255,255,255,0.9)", background: navy, fontWeight: 500 }}>
                        {h}
                      </th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {simulation.yearlySnapshots.map((s, i) => (
                    <tr key={s.year} style={{ background: i % 2 === 0 ? "transparent" : "rgba(26,36,114,0.02)", transition: "background 0.12s" }}>
                      <td style={{ padding: "10px 12px", fontFamily: "'DM Mono', monospace", color: muted, borderBottom: `1px solid ${border}` }}>Yr {s.year}</td>
                      <td style={{ padding: "10px 12px", textAlign: "right", color: text, borderBottom: `1px solid ${border}` }}>{fmt(s.totalContributedToDate)}</td>
                      <td style={{ padding: "10px 12px", textAlign: "right", color: gold, fontWeight: 600, fontFamily: "'DM Mono', monospace", borderBottom: `1px solid ${border}` }}>{fmt(s.annualDividend)}</td>
                      <td style={{ padding: "10px 12px", textAlign: "right", fontWeight: 700, color: navy, fontFamily: "'DM Mono', monospace", borderBottom: `1px solid ${border}` }}>{fmt(s.policyValue)}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>

          {/* ── GAP CLOSURE ── */}
          {results.cumulativeShortfall > 0 && (
            <div style={{ background: `linear-gradient(135deg, ${navyDark} 0%, ${navy} 60%, ${navyBlue} 100%)`, borderRadius: 20, padding: "32px 36px", position: "relative", overflow: "hidden" }}>
              <div style={{ position: "absolute", top: 0, left: 0, right: 0, height: 3, background: `linear-gradient(90deg, ${gold}, ${goldLight}, ${gold})` }} />
              <svg style={{ position: "absolute", right: -20, top: -30, pointerEvents: "none" }} width="200" height="200" viewBox="0 0 200 200" aria-hidden="true">
                <circle cx="100" cy="100" r="90" fill="none" stroke="rgba(255,255,255,0.04)" strokeWidth="1.5"/>
                <circle cx="100" cy="100" r="55" fill="none" stroke={goldPale} strokeOpacity="0.07" strokeWidth="1"/>
              </svg>

              <div style={{ fontFamily: "'DM Mono', monospace", fontSize: 10, letterSpacing: "0.2em", textTransform: "uppercase", color: goldLight, marginBottom: 10, opacity: 0.8 }}>Gap closure</div>
              <h3 style={{ fontFamily: "'Playfair Display', serif", fontSize: "clamp(20px, 3vw, 28px)", fontWeight: 600, color: "#fff", margin: "0 0 28px", lineHeight: 1.2 }}>
                How much of the shortfall does this close?
              </h3>

              {/* Progress ring + bar */}
              <div style={{ display: "flex", gap: 32, alignItems: "center", marginBottom: 32, flexWrap: "wrap" }}>
                {/* Ring */}
                <div style={{ flexShrink: 0 }}>
                  <svg width="130" height="130" viewBox="0 0 130 130" aria-label={`${Math.round(gapPct)}% of gap covered`}>
                    <circle cx="65" cy="65" r={ringR} fill="none" stroke="rgba(255,255,255,0.1)" strokeWidth="10"/>
                    <circle cx="65" cy="65" r={ringR} fill="none"
                      stroke={gapPct >= 100 ? "#4ade80" : gold} strokeWidth="10"
                      strokeDasharray={ringC} strokeDashoffset={ringOffset}
                      strokeLinecap="round"
                      className="ring-circle"
                      style={{ transform: "rotate(-90deg)", transformOrigin: "65px 65px" }}
                    />
                    <text x="65" y="60" textAnchor="middle" style={{ fontFamily: "'Playfair Display', serif", fontSize: "26px", fontWeight: "700", fill: gapPct >= 100 ? "#4ade80" : goldLight }}>
                      {Math.round(gapPct)}%
                    </text>
                    <text x="65" y="78" textAnchor="middle" style={{ fontFamily: "'DM Mono', monospace", fontSize: "10px", fill: "rgba(255,255,255,0.4)" }}>covered</text>
                  </svg>
                </div>

                <div style={{ flex: 1, minWidth: 200 }}>
                  <div style={{ fontSize: 13, color: "rgba(255,255,255,0.5)", marginBottom: 10 }}>
                    {fmt(simulation.postTermMonthlyDividend)}/mo dividend vs. {fmt(simulation.firstYearMonthlyGap)}/mo gap
                  </div>
                  <div style={{ height: 10, background: "rgba(255,255,255,0.1)", borderRadius: 100, overflow: "hidden", marginBottom: 12 }}>
                    <div className="gap-fill" style={{
                      height: "100%", borderRadius: 100,
                      width: `${Math.min(gapPct, 100)}%`,
                      background: gapPct >= 100
                        ? "linear-gradient(90deg, #22c55e, #4ade80)"
                        : `linear-gradient(90deg, ${gold}, ${goldLight})`,
                    }} />
                  </div>
                  <div style={{ fontFamily: "'Playfair Display', serif", fontSize: "clamp(22px, 3vw, 32px)", fontWeight: 700, color: gapPct >= 100 ? "#4ade80" : goldLight, letterSpacing: "-0.02em" }}>
                    {Math.round(gapPct)}% of monthly gap closed
                  </div>
                </div>
              </div>

              {/* Before / After */}
              <div className="ba" style={{ display: "grid", gridTemplateColumns: "1fr 44px 1fr", gap: 12, alignItems: "center", marginBottom: 20 }}>
                <div style={{ background: "rgba(159,18,57,0.18)", border: `1.5px solid rgba(159,18,57,0.45)`, padding: "22px 24px", borderRadius: 14 }}>
                  <div style={{ fontFamily: "'DM Mono', monospace", fontSize: 9, letterSpacing: "0.12em", textTransform: "uppercase", color: "#fca5a5", marginBottom: 6 }}>Before</div>
                  <div style={{ fontSize: 12, color: "rgba(255,255,255,0.4)", marginBottom: 10 }}>Shortfall without this plan</div>
                  <div style={{ fontFamily: "'Playfair Display', serif", fontSize: "clamp(22px, 3.5vw, 34px)", fontWeight: 800, color: "#fca5a5", letterSpacing: "-0.025em" }}>
                    {fmt(results.cumulativeShortfall)}
                  </div>
                </div>
                <div className="ba-arr" style={{ display: "flex", alignItems: "center", justifyContent: "center" }}>
                  <svg width="28" height="28" viewBox="0 0 32 32" fill="none" aria-hidden="true">
                    <path d="M6 16h20M18 8l8 8-8 8" stroke={goldLight} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" />
                  </svg>
                </div>
                <div style={{
                  background: simulation.adjustedShortfall > 0 ? "rgba(22,101,52,0.2)" : "rgba(22,101,52,0.3)",
                  border: `1.5px solid rgba(74,222,128,0.35)`, padding: "22px 24px", borderRadius: 14,
                }}>
                  <div style={{ fontFamily: "'DM Mono', monospace", fontSize: 9, letterSpacing: "0.12em", textTransform: "uppercase", color: "#86efac", marginBottom: 6 }}>After</div>
                  <div style={{ fontSize: 12, color: "rgba(255,255,255,0.4)", marginBottom: 10 }}>Remaining shortfall with dividends</div>
                  <div style={{ fontFamily: "'Playfair Display', serif", fontSize: "clamp(22px, 3.5vw, 34px)", fontWeight: 800, color: simulation.adjustedShortfall > 0 ? "#86efac" : "#4ade80", letterSpacing: "-0.025em" }}>
                    {simulation.adjustedShortfall > 0 ? fmt(simulation.adjustedShortfall) : "Fully covered"}
                  </div>
                </div>
              </div>

              {/* Lifetime banner */}
              <div style={{ background: "rgba(255,255,255,0.05)", border: `1px solid rgba(255,255,255,0.1)`, borderRadius: 14, padding: "20px 24px", display: "grid", gridTemplateColumns: "1fr 1px 1fr", gap: 20, alignItems: "center" }}>
                <div>
                  <div style={{ fontFamily: "'DM Mono', monospace", fontSize: 9, letterSpacing: "0.12em", textTransform: "uppercase", color: "rgba(255,255,255,0.35)", marginBottom: 8 }}>
                    Lifetime dividends · age {retirementAge}–{lifeExpectancy}
                  </div>
                  <div style={{ fontFamily: "'Playfair Display', serif", fontSize: "clamp(20px, 3vw, 30px)", fontWeight: 700, color: gold }}>{fmt(simulation.lifetimeDividends)}</div>
                </div>
                <div style={{ background: "rgba(255,255,255,0.08)", alignSelf: "stretch" }} />
                <div style={{ textAlign: "right" }}>
                  <div style={{ fontFamily: "'DM Mono', monospace", fontSize: 9, letterSpacing: "0.12em", textTransform: "uppercase", color: "rgba(255,255,255,0.35)", marginBottom: 8 }}>Shortfall reduced by</div>
                  <div style={{ fontFamily: "'Playfair Display', serif", fontSize: "clamp(20px, 3vw, 30px)", fontWeight: 700, color: goldLight }}>
                    {Math.round(Math.min(100, (simulation.lifetimeDividends / results.cumulativeShortfall) * 100))}%
                  </div>
                </div>
              </div>
            </div>
          )}

          <div style={{ fontSize: 11, color: muted, marginTop: 20, lineHeight: 1.7, fontStyle: "italic" }}>
            Illustration assumes policy value does not appreciate or depreciate. Dividends are projected at {simDividendRate}% p.a. and are not guaranteed.
          </div>
        </div>

        {/* ── FOOTNOTE ── */}
        <div style={{ fontSize: 11.5, lineHeight: 1.8, color: muted, fontStyle: "italic", paddingTop: 24, borderTop: `1px solid ${border}` }}>
          Figures based on CPF Board 2026 retirement sums and CPF LIFE payout estimates for members turning 55 in 2026. Escalating Plan assumed to start ~20% lower than Standard, growing 2% p.a. Insurance and investment returns are projected based on client inputs — actual returns not guaranteed. Inflation applied to expenses only. This is a planning illustration and does not constitute a formal needs analysis or product recommendation. Prepared by Jason Ng, DP Organisation · Great Eastern Financial Advisers · IAC 1220629.
        </div>
      </div>
    </div>
  );
}

// ── HELPER COMPONENTS ─────────────────────────────────────────────────────────

function DPGSlider({ label, value, setValue, min, max, step = 1, prefix = "", suffix = "", navy, gold, muted, border }) {
  const [active, setActive] = useState(false);
  const id = `s-${label.replace(/\s+/g, "-").toLowerCase()}`;
  const pct = ((value - min) / (max - min)) * 100;
  const fmtVal = (v) => prefix + (typeof v === "number" && v >= 1000 ? v.toLocaleString("en-SG") : v) + suffix;
  return (
    <div>
      <label htmlFor={id} style={{ fontFamily: "'DM Mono', monospace", fontSize: 10, letterSpacing: "0.12em", textTransform: "uppercase", color: muted, display: "block", marginBottom: 4 }}>{label}</label>
      <div style={{ fontFamily: "'Playfair Display', serif", fontSize: 28, fontWeight: 700, letterSpacing: "-0.02em", color: navy, lineHeight: 1.1, margin: "4px 0 0" }}>
        {fmtVal(value)}
      </div>
      <div style={{ position: "relative", paddingTop: 2 }}>
        {active && (
          <div style={{
            position: "absolute", top: -2, left: `clamp(18px, calc(${pct}% - 12px), calc(100% - 54px))`,
            background: navy, color: "#fff", padding: "4px 10px", borderRadius: 8,
            fontSize: 11, fontFamily: "'DM Mono', monospace", whiteSpace: "nowrap",
            pointerEvents: "none", boxShadow: "0 3px 10px rgba(26,36,114,0.25)",
            zIndex: 5,
          }}>
            {fmtVal(value)}
          </div>
        )}
        <input
          id={id} type="range" min={min} max={max} step={step} value={value}
          onChange={(e) => {
            const v = step % 1 !== 0 ? parseFloat(e.target.value) : parseInt(e.target.value);
            setValue(v);
          }}
          onMouseDown={() => setActive(true)}
          onMouseUp={() => setActive(false)}
          onTouchStart={() => setActive(true)}
          onTouchEnd={() => setActive(false)}
          aria-label={label}
        />
        <div style={{ display: "flex", justifyContent: "space-between", fontSize: 10.5, color: muted, fontFamily: "'DM Mono', monospace" }}>
          <span>{fmtVal(min)}</span>
          <span>{fmtVal(max)}</span>
        </div>
      </div>
    </div>
  );
}

function DPGRollup({ label, value, navy, muted, gold }) {
  return (
    <div>
      <div style={{ fontFamily: "'DM Mono', monospace", fontSize: 9.5, letterSpacing: "0.12em", textTransform: "uppercase", color: muted, marginBottom: 6 }}>{label}</div>
      <div style={{ fontFamily: "'Playfair Display', serif", fontSize: 22, fontWeight: 700, letterSpacing: "-0.015em", color: navy }}>{value}</div>
    </div>
  );
}
    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<CPFRetirementPlanner />);
  </script>
</body>
