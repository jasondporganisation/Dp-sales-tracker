name: Daily Sales Report

on:
  repository_dispatch:
    types: [daily-report]
  schedule:
    - cron: '45 13 * * *'   # 9:45 PM SGT = 13:45 UTC (backup)
  workflow_dispatch:

jobs:
  send-report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Send daily Telegram report
        run: node scripts/send-report.js
