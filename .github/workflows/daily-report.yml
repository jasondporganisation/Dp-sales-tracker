name: Daily Sales Report & Champ

on:
  repository_dispatch:
    types: [daily-report]
  schedule:
    - cron: '45 11 * * *'   # backup in case cron-job.org misses
  workflow_dispatch:

jobs:
  send-report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Send daily Telegram report
        run: node scripts/send-report.js
      - name: Send daily champ message
        run: node scripts/send-champ.js
