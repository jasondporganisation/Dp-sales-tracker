name: Daily & Weekly Champ

on:
  schedule:
    - cron: '50 13 * * *'   # 9:50 PM SGT = 13:50 UTC (5 min after daily report)
  workflow_dispatch:          # Allow manual trigger

jobs:
  send-champ:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Send champ messages
        run: node scripts/send-champ.js
